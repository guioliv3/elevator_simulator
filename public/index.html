<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Elevator Simulator</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

<div class="container">

  <div class="panel" id="panel"></div>

  <div class="shaft">
    <div class="elevator" id="elevator">🚪</div>
  </div>

  <div class="info-card" aria-live="polite">
    <div class="info-title">Painel do Elevador</div>
    <div class="info-row">
      <span class="info-label">Andar</span>
      <span class="info-value" id="info-floor">-</span>
    </div>
    <div class="info-row">
      <span class="info-label">Direcao</span>
      <span class="info-value" id="info-direction">-</span>
    </div>
    <div class="info-row">
      <span class="info-label">Fila</span>
      <span class="info-value info-queue" id="info-queue">-</span>
    </div>
  </div>

</div>

<div class="status" id="status">Carregando...</div>

<script src="ElevatorUI.js"></script>

</body>
</html>
